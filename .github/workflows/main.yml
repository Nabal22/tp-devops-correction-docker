name: CI devops 2025

on:
  # Lancer le pipeline sur les branches main et develop
  push:
    branches:
      - main
      - develop
  pull_request:

jobs:
  test-backend:
    runs-on: ubuntu-24.04
    steps:
      # Récupérer le code du dépôt
      - name: Checkout code
        uses: actions/checkout@v4

      # Installer le JDK 21 (distribution Temurin)
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      # Construire, tester et analyser la qualité du code avec SonarCloud
      # (jacoco génère la couverture pendant verify, puis sonar l'envoie)
      - name: Build and test with Maven + SonarCloud
        run: mvn -B verify sonar:sonar -Dsonar.projectKey=tp -Dsonar.organization=tp-devops-alban-genial -Dsonar.host.url=https://sonarcloud.io -Dsonar.login=${{ secrets.SONAR_TOKEN }} --file ./simple-api/pom.xml

  # Construire et publier les images Docker
  build-and-push-docker-image:
    # S'exécute uniquement si la compilation et les tests sont OK
    needs: test-backend
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Connexion à Docker Hub avec les secrets (jamais en clair dans le YAML)
      - name: Login to DockerHub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login --username ${{ secrets.DOCKERHUB_USERNAME }} --password-stdin

      - name: Build image and push backend
        uses: docker/build-push-action@v6
        with:
          # chemin relatif vers le code source contenant le Dockerfile
          context: ./simple-api
          # Note : les tags doivent être en minuscules
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/tp-devops-simple-api:latest
          # build sur toutes les branches, push uniquement sur main
          push: ${{ github.ref == 'refs/heads/main' }}

      - name: Build image and push database
        uses: docker/build-push-action@v6
        with:
          context: ./database
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/tp-devops-database:latest
          push: ${{ github.ref == 'refs/heads/main' }}

      - name: Build image and push httpd
        uses: docker/build-push-action@v6
        with:
          context: ./http-server
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/tp-devops-httpd:latest
          push: ${{ github.ref == 'refs/heads/main' }}
