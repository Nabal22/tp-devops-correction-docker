name: CI devops 2025 - Test Backend

on:
  # Tests lancés sur main et develop, et sur les pull requests
  push:
    branches:
      - main
      - develop
  pull_request:

jobs:
  test-backend:
    runs-on: ubuntu-24.04
    steps:
      # Récupérer le code du dépôt
      - name: Checkout code
        uses: actions/checkout@v4

      # Installer le JDK 21 (distribution Temurin)
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      # Build + tests (unitaires + intégration) + analyse SonarCloud
      # (jacoco génère la couverture pendant verify, puis sonar l'envoie)
      - name: Build and test with Maven + SonarCloud
        run: mvn -B verify sonar:sonar -Dsonar.projectKey=tp -Dsonar.organization=tp-devops-alban-genial -Dsonar.host.url=https://sonarcloud.io -Dsonar.token=${{ secrets.SONAR_TOKEN }} --file ./simple-api/pom.xml
