name: Build and Push Docker Images

on:
  # Déclenché uniquement quand le workflow de test se termine,
  # et seulement pour la branche main
  workflow_run:
    workflows: ["CI devops 2025 - Test Backend"]
    types:
      - completed
    branches:
      - main

jobs:
  build-and-push-docker-image:
    # Ne s'exécute que si le workflow de test a réussi
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Connexion à Docker Hub avec les secrets (jamais en clair dans le YAML)
      - name: Login to DockerHub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login --username ${{ secrets.DOCKERHUB_USERNAME }} --password-stdin

      - name: Build image and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./simple-api
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/tp-devops-simple-api:latest
          # on est déjà sur main (filtre workflow_run), donc on pousse
          push: true

      - name: Build image and push database
        uses: docker/build-push-action@v6
        with:
          context: ./database
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/tp-devops-database:latest
          push: true

      - name: Build image and push httpd
        uses: docker/build-push-action@v6
        with:
          context: ./http-server
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/tp-devops-httpd:latest
          push: true
